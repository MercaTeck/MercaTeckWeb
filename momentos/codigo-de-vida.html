<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Código de Vida — MercaTeck</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#080809;--surface:#0f0f11;--gold:#c9a96e;--text:#ede9e0;--muted:#555260;--border:rgba(201,169,110,0.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;}
nav{position:fixed;top:0;width:100%;z-index:100;padding:1.8rem 5rem;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(8,8,9,.95),transparent);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.12em;color:var(--text);text-decoration:none;}
.logo em{color:var(--gold);font-style:normal;}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:8rem 2rem;}
.hero-tag{font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:2rem;}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,10vw,8rem);line-height:.95;margin-bottom:1.5rem;}
.hero p{color:var(--muted);max-width:480px;line-height:1.8;margin-bottom:1rem;}
.placeholder-note{margin-top:2rem;padding:1rem 1.5rem;border:1px dashed rgba(201,169,110,.3);color:var(--gold);font-size:.85rem;letter-spacing:.05em;}
.back-btn{position:fixed;bottom:2rem;right:2rem;background:var(--gold);color:var(--bg);padding:.7rem 1.2rem;text-decoration:none;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;z-index:99;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">MERCATECK<em>.</em></a>
</nav>
<div class="hero">
  <div class="hero-tag">✦ Proyecto Personal</div>
  <h1>Código<br>de Vida</h1>
  <p>Esta página está en construcción.</p>
  <div class="placeholder-note">📝 Pendiente: completar descripción, lenguaje y funciones del proyecto.</div>
</div>
<a href="index.html" class="back-btn">← Portafolio</a>
</body>
</html>
